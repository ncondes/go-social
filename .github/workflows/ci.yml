name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run on the same branch when a new push is made.
# Avoids wasting CI minutes on outdated commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs static analysis, linting, and unit tests.
  # Does not require a database — fast feedback on every push and PR.
  unit:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate docs
        run: swag init -g main.go -d ./cmd/api/,./internal/handlers,./internal/dtos,./internal/domain -o ./docs

      - name: Verify dependencies
        run: go mod verify

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build -v ./...

      - name: Run go vet (static analysis)
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run unit tests
        run: go test -race -v ./...

  # Runs integration tests against a real PostgreSQL instance.
  # Only runs after the unit job passes to avoid wasting resources.
  # Tests are gated by the `integration` build tag — see //go:build integration.
  integration:
    needs: unit
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: social_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate docs
        run: swag init -g main.go -d ./cmd/api/,./internal/handlers,./internal/dtos,./internal/domain -o ./docs

      # Apply all migrations so the test DB schema matches what the tests expect.
      - name: Install migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations
        run: migrate -path cmd/db/migrations -database "postgres://postgres:password@localhost:5433/social_test?sslmode=disable" up

      - name: Run integration tests
        run: go test -race -v -tags integration ./...
        env:
          DB_TEST_ADDR: postgres://postgres:password@localhost:5433/social_test?sslmode=disable
