name: Update API Version and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Update API version from CHANGELOG.md
        run: |
          VERSION=$(grep -oP '## \K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md, skipping"
            exit 0
          fi
          echo "Found version: $VERSION"
          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" cmd/api/main.go
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cmd/api/main.go
          git commit -m "chore: update API version to $VERSION" || { echo "No changes to commit"; exit 0; }
          git push