services:
  # Development database
  social-db:
    image: postgres:16.3
    container_name: social-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  # Test database
  social-test-db:
    image: postgres:16.3
    container_name: social-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  # Redis cache
  social-redis:
    image: redis:7-alpine
    container_name: social-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --logLevel warning
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  # Redis Commander - Web UI for Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    hostname: redis-commander
    environment:
      - REDIS_HOSTS=local:social-redis:6379:0:${REDIS_PASSWORD}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - social-redis

  # Web UI (React/Vite) - User activation
  social-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: social-web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  postgres_dev_data:
  postgres_test_data:
  redis_data:

    

    